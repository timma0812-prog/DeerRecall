version: 1
kind: pipeline
spec:
  stages:
    - name: deerrecall_delivery
      type: ci
      spec:
        volumes:
          - name: docker_sock
            type: host
            spec:
              path: /var/run/docker.sock
        steps:
          - name: test
            type: run
            spec:
              container: node:20-alpine
              script: |-
                set -eu
                npm run check

          - name: build_static
            type: run
            spec:
              container: node:20-alpine
              script: |-
                set -eu
                npm run build
                npm run verify:dist

          - name: build_image
            type: run
            spec:
              container: docker:27-cli
              mount:
                - name: docker_sock
                  path: /var/run/docker.sock
              script: |-
                docker build -t ${DEERRECALL_IMAGE:-deerrecall:local} .

          - name: deploy_compose
            type: run
            spec:
              container: docker:27-cli
              mount:
                - name: docker_sock
                  path: /var/run/docker.sock
              script: |-
                docker compose up -d

          - name: verify_deploy
            type: run
            spec:
              container: docker:27-cli
              mount:
                - name: docker_sock
                  path: /var/run/docker.sock
              script: |-
                set -eu
                APP_CONTAINER="${DEERRECALL_CONTAINER:-deerrecall}"
                READY=0

                for attempt in $(seq 1 20); do
                  if docker exec "${APP_CONTAINER}" wget -qO- http://127.0.0.1:8080/health > /tmp/deerrecall-health.json; then
                    READY=1
                    break
                  fi
                  sleep 1
                done

                test "${READY}" = "1"
                grep -q '"ok":true' /tmp/deerrecall-health.json

                docker exec "${APP_CONTAINER}" wget -qO- http://127.0.0.1:8080/ > /tmp/deerrecall-index.html

                grep -q "id=\"resultsState\"" /tmp/deerrecall-index.html
                grep -q "id=\"candidateResumeState\"" /tmp/deerrecall-index.html
                grep -q "id=\"exportCenterState\"" /tmp/deerrecall-index.html
                grep -q "id=\"searchFilterState\"" /tmp/deerrecall-index.html
                grep -q "data-market-insight-run" /tmp/deerrecall-index.html
                grep -q "deersearch-engine.js" /tmp/deerrecall-index.html

                docker exec "${APP_CONTAINER}" wget -qO- http://127.0.0.1:8080/api/ai/status > /tmp/deerrecall-ai-status.json
                grep -q '"configured"' /tmp/deerrecall-ai-status.json

                docker exec "${APP_CONTAINER}" wget -qS --spider http://127.0.0.1:8080/app.js 2>&1 | grep -qi "cache-control: no-cache, must-revalidate"
                docker exec "${APP_CONTAINER}" wget -qS --spider http://127.0.0.1:8080/deersearch-engine.js 2>&1 | grep -qi "cache-control: no-cache, must-revalidate"
                docker exec "${APP_CONTAINER}" wget -qS --spider http://127.0.0.1:8080/styles.css 2>&1 | grep -qi "cache-control: no-cache, must-revalidate"
                docker exec "${APP_CONTAINER}" wget -qS --spider http://127.0.0.1:8080/ 2>&1 | grep -qi "cache-control: no-store"
